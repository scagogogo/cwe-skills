name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        go-version: ['1.23', '1.24', '1.25']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Go Mod Download
        run: go mod download

      - name: Go Vet
        run: go vet ./...

      - name: Test
        run: go test -count=1 -coverprofile=coverage.out ./...

      - name: Upload Coverage
        if: matrix.go-version == '1.25'
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12
          args: --timeout=5m

  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build CLI
        run: go build -o cwe-cli ./cmd/cwe/

      - name: Test CLI
        run: |
          ./cwe-cli version
          ./cwe-cli parse CWE-79 89
          ./cwe-cli validate CWE-79
          ./cwe-cli format 79 89 352
          ./cwe-cli wellknown top25
          ./cwe-cli enum abstraction
