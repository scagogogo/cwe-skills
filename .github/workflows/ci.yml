name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        go-version: ['1.25']
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Go Mod Download
        run: go mod download

      - name: Go Vet
        run: go vet ./...

      - name: Test with Race
        run: go test -race -count=1 -coverprofile=coverage.out ./...

      - name: Coverage Gate
        run: |
          set -e
          # 整体覆盖率门禁（含 cmd/* 的不可测 main/os.Exit 分支，故阈值留缓冲）
          total=$(go tool cover -func=coverage.out | awk '/^total:/ {print $3}' | tr -d '%')
          echo "Total coverage: ${total}%"
          if awk -v t="$total" 'BEGIN{exit !(t < 95)}'; then
            echo "::error::Total coverage ${total}% is below the 95% gate"
            exit 1
          fi
          # SDK 核心包（无不可测分支）单独设高门禁
          sdk=$(go test -count=1 -coverprofile=/tmp/sdk.out . 2>/dev/null | grep -oE 'coverage: [0-9.]+%' | head -1 | grep -oE '[0-9.]+')
          echo "SDK coverage: ${sdk}%"
          if awk -v t="$sdk" 'BEGIN{exit !(t < 99)}'; then
            echo "::error::SDK coverage ${sdk}% is below the 99% gate"
            exit 1
          fi

      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: coverage
          path: coverage.out

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Golangci-lint
        uses: golangci/golangci-lint-action@v7
        with:
          version: v2.12
          args: --timeout=5m

  build-cli:
    name: Build CLI
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build CLI
        run: go build -o cwe-cli ./cmd/cwe/

      - name: Test CLI
        run: |
          ./cwe-cli version
          ./cwe-cli parse CWE-79 89
          ./cwe-cli validate CWE-79
          ./cwe-cli format 79 89 352
          ./cwe-cli wellknown top25
          ./cwe-cli enum abstraction

  build-mcp:
    name: Build MCP Server
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Build MCP Server
        run: go build -o cwe-mcp ./cmd/cwe-mcp/

      - name: Test MCP Server
        run: |
          ./cwe-mcp --version
          # 验证 stdio 握手与工具列表
          echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}' | ./cwe-mcp > init.json
          grep -q '"serverInfo"' init.json
          (echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}'; \
           echo '{"jsonrpc":"2.0","method":"notifications/initialized"}'; \
           echo '{"jsonrpc":"2.0","id":2,"method":"tools/list"}') | ./cwe-mcp > tools.json
          # 工具列表应有 20 个工具
          TOOL_COUNT=$(grep -o '"name":"[a-z_]*"' tools.json | wc -l)
          echo "tool count: $TOOL_COUNT"
          test "$TOOL_COUNT" -eq 20
          # 测试在线工具调用（纯本地，无需 XML）
          (echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}'; \
           echo '{"jsonrpc":"2.0","method":"notifications/initialized"}'; \
           echo '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"parse_cwe_id","arguments":{"id":"CWE-79"}}}') | ./cwe-mcp > call.json
          grep -q 'CWE-79' call.json
          grep -q 'valid' call.json
          # 测试离线工具调用（需 XML 目录，回归 build_tree 循环引用 bug）
          (echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}'; \
           echo '{"jsonrpc":"2.0","method":"notifications/initialized"}'; \
           echo '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"build_tree","arguments":{"root":"CWE-74"}}}') | ./cwe-mcp --xml testdata/sample_cwe_catalog.xml > tree.json
          # 结果在 JSON 字符串里被转义，匹配字段名即可
          grep -q 'max_depth' tree.json
          grep -q 'CWE-74' tree.json
          grep -q 'Injection' tree.json
          # 离线搜索
          (echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}'; \
           echo '{"jsonrpc":"2.0","method":"notifications/initialized"}'; \
           echo '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"search_keyword","arguments":{"keyword":"Injection"}}}') | ./cwe-mcp --xml testdata/sample_cwe_catalog.xml > search.json
          grep -q 'SQL Injection' search.json
          # get_weakness 离线回退：API 不可达时回退到 XML 注册表，返回 source:offline + cwe 数据
          (echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}'; \
           echo '{"jsonrpc":"2.0","method":"notifications/initialized"}'; \
           echo '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"get_weakness","arguments":{"id":"CWE-79"}}}') | ./cwe-mcp --xml testdata/sample_cwe_catalog.xml > weakness.json
          # 无论在线（source:online）还是离线回退（source:offline），都应返回 CWE-79 数据
          grep -q 'Cross-site Scripting' weakness.json
          # get_parents 离线回退：API 不可达时回退到 XML 注册表，返回父级 CWE-74
          (echo '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1.0"}}}'; \
           echo '{"jsonrpc":"2.0","method":"notifications/initialized"}'; \
           echo '{"jsonrpc":"2.0","id":2,"method":"tools/call","params":{"name":"get_parents","arguments":{"id":"CWE-79"}}}') | ./cwe-mcp --xml testdata/sample_cwe_catalog.xml > parents.json
          grep -q 'Injection' parents.json
